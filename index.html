<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boom Boom Buster</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #87CEEB;
      font-family: 'Arial', sans-serif;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas#game-canvas {
      display: block;
      background: #87CEEB;
    }

    .panel {
      position: fixed;
      bottom: 16px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: rgba(0, 0, 0, 0.75);
      padding: 20px;
      border-radius: 16px;
      z-index: 100;
    }

    #left-panel {
      left: 16px;
    }

    #right-panel {
      right: 16px;
    }

    .panel-label {
      color: rgba(255, 255, 255, 0.7);
      font-weight: bold;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #angle-canvas {
      border-radius: 8px;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      background: #4CAF50;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
      background: #45a049;
    }

    button:active {
      transform: scale(0.95);
    }

    #start-btn {
      background: #ff9800;
      font-size: 18px;
      padding: 20px 40px;
    }

    #start-btn:hover {
      background: #e68900;
    }

    #start-btn:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .speed-meter {
      width: 160px;
      height: 30px;
      background: #333;
      border-radius: 5px;
      overflow: hidden;
      position: relative;
    }

    .speed-bar {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #ff9800, #f44336);
      transition: width 0.05s linear;
    }

    .speed-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-weight: bold;
      text-shadow: 1px 1px 2px black;
    }

    #reset-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #reset-scrim {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    #reset-dialog {
      position: relative;
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    #reset-dialog h2 {
      margin: 0 0 20px 0;
      font-size: 24px;
      color: #333;
    }

    #reset-btn {
      background: #4CAF50;
      font-size: 18px;
      padding: 20px 40px;
    }

    #reset-btn:hover {
      background: #45a049;
    }

    @media (orientation: portrait) {
      body::before {
        content: 'Please rotate your device to landscape mode';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: black;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        text-align: center;
        padding: 20px;
        z-index: 9999;
      }

      #game-container {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>

    <!-- Left panel: angle arc + ramp preview -->
    <div id="left-panel" class="panel">
      <div class="panel-label">Ramp Angle</div>
      <canvas id="angle-canvas" width="300" height="110"></canvas>
    </div>

    <!-- Right panel: speed + launch -->
    <div id="right-panel" class="panel">
      <div class="panel-label">Speed</div>
      <div class="speed-meter">
        <div class="speed-bar" id="speed-bar"></div>
        <div class="speed-value" id="speed-value">50%</div>
      </div>
      <button id="start-btn">START RUN!</button>
    </div>

    <div id="reset-modal">
      <div id="reset-scrim"></div>
      <div id="reset-dialog">
        <h2>Run Complete!</h2>
        <button id="reset-btn">TRY AGAIN</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
